<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust Bookings</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
        }

        /* Navigation Bar */
        header {
            background-color: #ffffff;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #007BFF;
        }

        nav a {
            margin-left: 1.5rem;
            text-decoration: none;
            color: #555;
            font-weight: 500;
        }

        nav a:hover {
            color: #007BFF;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 0 1rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        /* Booking Form Container */
        .booking-container {
            max-width: 800px;
            margin: -50px auto 3rem auto;
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            z-index: 10;
        }

        .booking-container h2 {
            margin-bottom: 1.5rem;
            color: #222;
            text-align: center;
        }

        /* Form Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #666;
        }

        input, select {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #007BFF;
        }

        /* Submit Button */
        .btn-submit {
            grid-column: span 2;
            background-color: #007BFF;
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: #0056b3;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            background-color: #222;
            color: #fff;
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width, .btn-submit {
                grid-column: span 1;
            }
            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🌍 Wanderlust</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Destinations</a>
            <a href="#">My Bookings</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Find Your Next Adventure</h1>
        <p>Discover beautiful places at the best prices</p>
    </section>

    <main class="booking-container">
        <h2>Book Your Trip</h2>
        <form id="tripBookingForm">
            <div class="form-grid">
                
                <div class="form-group full-width">
                    <label for="destination">Where to?</label>
                    <select id="destination" required>
                        <option value="" disabled selected>Select a destination</option>
                        <option value="paris">Paris, France</option>
                        <option value="tokyo">Tokyo, Japan</option>
                        <option value="bali">Bali, Indonesia</option>
                        <option value="newyork">New York, USA</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="departure-date">Departure Date</label>
                    <input type="date" id="departure-date" required>
                </div>

                <div class="form-group">
                    <label for="return-date">Return Date</label>
                    <input type="date" id="return-date" required>
                </div>

                <div class="form-group">
                    <label for="guests">Guests</label>
                    <input type="number" id="guests" min="1" max="10" value="1" required>
                </div>

                <div class="form-group">
                    <label for="travel-class">Class</label>
                    <select id="travel-class">
                        <option value="economy">Economy</option>
                        <option value="business">Business</option>
                        <option value="first">First Class</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Search Flights & Hotels</button>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Wanderlust Travel Agency. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('tripBookingForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Stop the page from refreshing
            
            // Grab form values
            const destination = document.getElementById('destination').value;
            const departure = document.getElementById('departure-date').value;
            const returnDate = document.getElementById('return-date').value;
            const guests = document.getElementById('guests').value;
            const travelClass = document.getElementById('travel-class').value;

            // Simple validation check for dates
            if (new Date(departure) > new Date(returnDate)) {
                alert("Error: Return date cannot be before the departure date!");
                return;
            }

            // Display confirmation summary
            alert(`🎉 Booking Request Received!\n\n📍 Destination: ${destination}\n📅 Departure: ${departure}\n📅 Return: ${returnDate}\n👥 Guests: ${guests}\n✈️ Class: ${travelClass}`);
        });
    </script>
</body>
</html>
